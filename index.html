<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新荣记 — 食必求真，然后至美</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===== Hero ===== -->
  <section class="hero" id="hero">
    <!-- 左上角 Logo（静态，不随滚动移动） -->
    <a class="hero-logo" href="#" aria-label="新荣记">
      <img src="hero-bg.png" alt="新荣记 XINRONGJI" />
    </a>

    <div class="hero-bg" aria-hidden="true">
      <img src="hero-poster-new.png" alt="" class="hero-poster" />
      <video loop muted playsinline preload="none" poster="hero-poster-new.png">
      </video>
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="hero-title">食必求真<span class="hero-title-divider">，</span>然后至美</h1>
      <p class="hero-sub">
        从临海一间路边排档，到米其林三星中餐品牌。<br />
        三十年，只做一件事——让世界看见台州味道。
      </p>
    </div>
    <div class="scroll-hint" aria-hidden="true">
      <span>向下探索</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 5v14M5 12l7 7 7-7" />
      </svg>
    </div>
  </section>

  <!-- ===== 荣誉卡片 ===== -->
  <section class="honors" id="honors">
    <div class="honors-grid">
      <article class="honor-card reveal">
        <span class="honor-icon">★★★</span>
        <strong class="honor-value"><span class="count" data-target="3">0</span> 星</strong>
        <h3>米其林</h3>
        <p>中国大陆首家米其林三星中餐品牌</p>
        <span class="honor-year">2020</span>
      </article>
      <article class="honor-card reveal">
        <span class="honor-icon">◆◆◆</span>
        <strong class="honor-value"><span class="count" data-target="3">0</span> 钻</strong>
        <h3>黑珍珠</h3>
        <p>黑珍珠餐厅指南三钻认证</p>
        <span class="honor-year">2020</span>
      </article>
      <article class="honor-card reveal">
        <span class="honor-icon">一九九五</span>
        <strong class="honor-value"><span class="count" data-target="30">0</span> 年</strong>
        <h3>台州起源</h3>
        <p>从临海路边排档到世界级中餐</p>
        <span class="honor-year">1995</span>
      </article>
    </div>
  </section>

  <!-- ===== 临时占位 ===== -->
  <section class="spacer" style="height:100vh; background:var(--bg-dark);" aria-hidden="true"></section>

  <script src="script.js"></script>
</body>
</html>
